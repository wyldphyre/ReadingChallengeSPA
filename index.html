<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reading">
    <link rel="apple-touch-icon" id="appIcon">
    <link rel="icon" type="image/svg+xml" id="faviconEl">
    <title>Reading Challenges</title>
    <style>
        :root {
            --color-bg: #111318;
            --color-surface: #1c1f28;
            --color-surface-translucent: rgba(28, 31, 40, 0.72);
            --color-surface-hover: #252931;
            --color-border: #2d3142;
            --color-text-primary: #eef0f6;
            --color-text-secondary: #9aa0b8;
            --color-text-muted: #545b73;
            --color-accent: #3d8ef5;
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-warning: #f59e0b;
            --color-shadow: rgba(0, 0, 0, 0.45);
        }

        [data-theme="light"] {
            --color-bg: #f4f5f9;
            --color-surface: #ffffff;
            --color-surface-translucent: rgba(255, 255, 255, 0.72);
            --color-surface-hover: #eef0f7;
            --color-border: #dde0eb;
            --color-text-primary: #1a1d2e;
            --color-text-secondary: #4b5168;
            --color-text-muted: #9299b0;
            --color-accent: #1a6ef5;
            --color-success: #059669;
            --color-danger: #dc2626;
            --color-warning: #d97706;
            --color-shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            background: var(--color-bg);
            min-height: 100vh;
            color: var(--color-text-secondary);
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: var(--color-text-primary);
            text-align: center;
            margin-bottom: 24px;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: -0.022em;
            text-shadow: none;
        }

        .add-btn {
            margin-bottom: 20px;
        }

        .add-form {
            background: var(--color-surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 3px var(--color-shadow);
            display: none;
        }

        .add-form.open {
            display: block;
        }

        .add-form h2 {
            margin: 0 0 16px 0;
            font-size: 1.15em;
            font-weight: 620;
            letter-spacing: -0.01em;
            color: var(--color-text-primary);
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.85em;
            color: var(--color-text-muted);
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s, background 0.2s;
            background: var(--color-surface-hover);
            color: var(--color-text-secondary);
        }

        input:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        button {
            background: var(--color-accent);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 590;
            letter-spacing: -0.01em;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .challenges {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .challenge-card {
            background: var(--color-surface);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 1px 3px var(--color-shadow);
        }

        .challenge-card.expandable {
            cursor: pointer;
        }

        .challenge-details {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--color-border);
        }

        .challenge-card.expanded .challenge-details {
            display: block;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            color: var(--color-text-muted);
        }

        .detail-value {
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        .challenge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .challenge-name {
            font-weight: 620;
            font-size: 1.15em;
            letter-spacing: -0.01em;
            color: var(--color-text-primary);
        }

        .expand-arrow {
            color: var(--color-text-muted);
            margin-left: 8px;
            display: inline-flex;
            align-items: center;
            vertical-align: middle;
            transition: transform 0.2s ease;
        }

        .challenge-card.expanded .expand-arrow {
            transform: rotate(90deg);
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .lock-btn {
            background: var(--color-surface-hover);
            color: var(--color-text-muted);
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-btn.locked {
            background: color-mix(in srgb, var(--color-warning) 16%, transparent);
            color: var(--color-warning);
        }

        .edit-btn {
            background: var(--color-accent);
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 8px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn:disabled,
        .counter-btn:disabled {
            background: var(--color-border);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .delete-btn {
            background: var(--color-danger);
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 8px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-bar {
            background: var(--color-border);
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            background: var(--color-accent);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            min-width: 0;
        }

        .progress-fill.complete {
            background: var(--color-success);
        }

        .excess {
            color: var(--color-success);
            font-weight: 600;
        }

        .ahead {
            color: var(--color-success);
        }

        .behind {
            color: var(--color-danger);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-text {
            font-size: 0.95em;
            color: var(--color-text-muted);
        }

        .stat-text strong {
            color: var(--color-text-secondary);
        }

        .counter-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .counter-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn.minus {
            background: var(--color-surface-hover);
            color: var(--color-accent);
            border: 1px solid var(--color-border);
        }

        .counter-btn.plus {
            background: var(--color-accent);
        }

        .empty-state {
            text-align: center;
            color: var(--color-text-muted);
            padding: 40px 20px;
            opacity: 0.9;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
        }

        .settings-btn {
            background: var(--color-surface);
            color: var(--color-text-secondary);
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 12px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .sheet-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--color-surface-translucent);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--color-border);
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            padding: 8px 20px 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 24px var(--color-shadow);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 11;
            max-height: 85vh;
            overflow-y: auto;
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        .sheet-drag-zone {
            padding: 6px 0 10px;
            margin: -8px -20px 0;
            touch-action: none;
            cursor: grab;
        }

        .sheet-drag-zone:active {
            cursor: grabbing;
        }

        .sheet-handle {
            width: 36px;
            height: 5px;
            background: var(--color-text-muted);
            border-radius: 3px;
            margin: 0 auto;
            opacity: 0.5;
            pointer-events: none;
        }

        .settings-panel h2 {
            margin: 0 0 16px 0;
            font-size: 1.1em;
            font-weight: 620;
            letter-spacing: -0.01em;
            text-align: center;
            color: var(--color-text-primary);
        }

        .settings-group {
            background: var(--color-surface-hover);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .settings-row {
            background: transparent;
            color: var(--color-text-primary);
            width: 100%;
            padding: 12px 16px;
            margin: 0;
            border: none;
            border-radius: 0;
            font-size: 0.95em;
            font-weight: 400;
            letter-spacing: -0.005em;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 44px;
            box-sizing: border-box;
        }

        .settings-row:not(:first-child) {
            border-top: 1px solid var(--color-border);
        }

        .settings-row.destructive {
            color: var(--color-danger);
            justify-content: center;
        }

        .settings-chevron {
            color: var(--color-text-muted);
            display: inline-flex;
            align-items: center;
        }

        .settings-label {
            font-size: 0.95em;
            color: var(--color-text-primary);
        }

        .theme-toggle {
            position: relative;
            display: flex;
            padding: 2px;
            border-radius: 9px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
        }

        .theme-thumb {
            position: absolute;
            top: 2px;
            bottom: 2px;
            left: 2px;
            width: calc(50% - 2px);
            background: var(--color-accent);
            border-radius: 7px;
            transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
            pointer-events: none;
        }

        .theme-toggle[data-active="light"] .theme-thumb {
            transform: translateX(100%);
        }

        .theme-btn {
            position: relative;
            z-index: 1;
            flex: 1;
            background: transparent;
            color: var(--color-text-secondary);
            border: none;
            border-radius: 0;
            padding: 6px 16px;
            margin-bottom: 0;
            font-size: 0.85em;
            font-weight: 500;
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.25s ease;
        }

        .theme-btn.active {
            color: white;
        }

        .version-info {
            margin-top: 4px;
            padding-top: 12px;
            font-size: 0.85em;
            color: var(--color-text-muted);
            text-align: center;
        }

        .previous-challenges-section {
            margin-top: 20px;
        }

        .previous-challenges-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--color-surface);
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            margin-bottom: 12px;
        }

        .previous-challenges-header:hover {
            background: var(--color-surface-hover);
        }

        .previous-challenges-header h2 {
            margin: 0;
            font-size: 1em;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .collapse-arrow {
            color: var(--color-text-muted);
            display: inline-flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .previous-challenges-header.expanded .collapse-arrow {
            transform: rotate(90deg);
        }

        .previous-challenges-content {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .previous-challenges-content.open {
            display: flex;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reading Challenges</h1>
            <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()"></button>
        </div>

        <div class="sheet-backdrop" id="sheetBackdrop" onclick="toggleSettings()"></div>
        <div class="settings-panel" id="settingsPanel">
            <div class="sheet-drag-zone" id="sheetDragZone">
                <div class="sheet-handle"></div>
            </div>
            <h2>Settings</h2>
            <div class="settings-group">
                <div class="settings-row">
                    <span class="settings-label">Theme</span>
                    <div class="theme-toggle" id="themeToggle" data-active="dark">
                        <div class="theme-thumb"></div>
                        <button class="theme-btn" id="themeBtnDark" onclick="setTheme('dark')">Dark</button>
                        <button class="theme-btn" id="themeBtnLight" onclick="setTheme('light')">Light</button>
                    </div>
                </div>
            </div>
            <div class="settings-group">
                <button class="settings-row" onclick="exportData()">
                    <span>Export Data</span>
                    <span class="settings-chevron" id="chevronExport"></span>
                </button>
                <button class="settings-row" onclick="document.getElementById('importFile').click()">
                    <span>Import Data</span>
                    <span class="settings-chevron" id="chevronImport"></span>
                </button>
                <button class="settings-row destructive" onclick="resetAllData()">
                    <span>Reset All Data</span>
                </button>
            </div>
            <input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display:none">
            <div class="version-info" id="versionInfo"></div>
        </div>

        <button class="add-btn" onclick="toggleAddForm()">Add New Challenge</button>

        <div class="add-form" id="addForm">
            <h2>New Challenge</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" placeholder="2026" min="1900" max="2100">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="target">Reading Target</label>
                    <input type="number" id="target" placeholder="12" min="1">
                </div>
                <div class="form-group">
                    <label for="booksCompleted">Books Completed</label>
                    <input type="number" id="booksCompleted" placeholder="0" min="0">
                </div>
            </div>
            <button id="formSubmitBtn" onclick="saveChallenge()">Add Challenge</button>
        </div>

        <div class="challenges" id="challenges"></div>
    </div>

    <script>
        const APP_VERSION = '1.3.0';
        const STORAGE_KEY = 'reading_challenges';
        const SETTINGS_KEY = 'reading_settings';
        let editingIndex = null;
        const expandedCards = new Set();
        let previousChallengesExpanded = false;

        const ICON_LOCKED = '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="3" y="10" width="18" height="12" rx="2"/><path d="M7 10V7a5 5 0 1 1 10 0v3" fill="none" stroke="currentColor" stroke-width="2.5"/></svg>';
        const ICON_UNLOCKED = '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="3" y="10" width="18" height="12" rx="2"/><path d="M7 10V7a5 5 0 1 1 10 0" fill="none" stroke="currentColor" stroke-width="2.5"/></svg>';
        const ICON_GEAR = '<svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.49.49 0 0 0-.49-.41h-3.84a.49.49 0 0 0-.49.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.49.49 0 0 0 .12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.39.3.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.49.41h3.84c.24 0 .44-.17.49-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>';
        const ICON_PLUS = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
        const ICON_MINUS = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';
        const ICON_XMARK = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
        const ICON_PENCIL = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
        const ICON_CHEVRON_RIGHT = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';

        function loadChallenges() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveChallenges(challenges) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(challenges));
        }

        function loadSettings() {
            const data = localStorage.getItem(SETTINGS_KEY);
            return data ? JSON.parse(data) : {};
        }

        function saveSettings(settings) {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggle').setAttribute('data-active', theme);
            document.getElementById('themeBtnDark').classList.toggle('active', theme === 'dark');
            document.getElementById('themeBtnLight').classList.toggle('active', theme === 'light');
        }

        function setTheme(theme) {
            const settings = loadSettings();
            settings.theme = theme;
            saveSettings(settings);
            applyTheme(theme);
        }

        function renderChallenges() {
            const challenges = loadChallenges();
            const container = document.getElementById('challenges');

            if (challenges.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No challenges yet.<br>Add your first reading challenge above!</p>
                    </div>
                `;
                return;
            }

            const sorted = challenges
                .map((c, index) => ({ ...c, originalIndex: index }))
                .sort((a, b) => (b.year || 0) - (a.year || 0));

            const currentYear = new Date().getFullYear();
            const currentYearChallenges = sorted.filter(c => c.year >= currentYear);
            const previousYearChallenges = sorted.filter(c => c.year < currentYear);

            function renderChallengeCard(c) {
                const booksCompleted = c.booksCompleted ?? 0;
                const percent = Math.round((booksCompleted / c.target) * 100);
                const barPercent = Math.min(100, percent);
                const targetMet = booksCompleted >= c.target;
                const excess = booksCompleted - c.target;
                const locked = c.locked ?? false;
                const isCurrentYear = c.year === currentYear;
                const stats = isCurrentYear ? calculateStats(c.year, c.target, booksCompleted) : null;
                const isExpanded = expandedCards.has(c.originalIndex);
                return `
                    <div class="challenge-card${isCurrentYear ? ' expandable' : ''}${isExpanded ? ' expanded' : ''}"${isCurrentYear ? ` onclick="toggleExpand(event, ${c.originalIndex})"` : ''}>
                        <div class="challenge-header">
                            <span class="challenge-name">${c.year || 'Unknown'}${isCurrentYear ? `<span class="expand-arrow">${ICON_CHEVRON_RIGHT}</span>` : ''}</span>
                            <div class="card-actions">
                                <button class="lock-btn${locked ? ' locked' : ''}" onclick="toggleLock(${c.originalIndex})">${locked ? ICON_LOCKED : ICON_UNLOCKED}</button>
                                <button class="edit-btn" onclick="editChallenge(${c.originalIndex})"${locked ? ' disabled' : ''}>${ICON_PENCIL}</button>
                                <button class="delete-btn" onclick="deleteChallenge(${c.originalIndex})">${ICON_XMARK}</button>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill${targetMet ? ' complete' : ''}" style="width: ${barPercent}%"></div>
                        </div>
                        <div class="stats">
                            <span class="stat-text">
                                <strong>${booksCompleted}</strong> of <strong>${c.target}</strong> (${percent}%)${excess > 0 ? ` <span class="excess">+${excess}</span>` : ''}
                            </span>
                            <div class="counter-controls">
                                <button class="counter-btn minus" onclick="updateCompleted(${c.originalIndex}, -1)"${locked ? ' disabled' : ''}>${ICON_MINUS}</button>
                                <button class="counter-btn plus" onclick="updateCompleted(${c.originalIndex}, 1)"${locked ? ' disabled' : ''}>${ICON_PLUS}</button>
                            </div>
                        </div>
                        ${isCurrentYear ? `<div class="challenge-details">
                            <div class="detail-row">
                                <span class="detail-label">Months Remaining</span>
                                <span class="detail-value">${stats.monthsRemaining}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Days Remaining</span>
                                <span class="detail-value">${stats.daysRemaining}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Days Elapsed</span>
                                <span class="detail-value">${stats.daysElapsed} (${stats.percentElapsed}%)</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Current Rate</span>
                                <span class="detail-value">${stats.currentRate} bpm (${stats.booksAhead})</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Required Rate</span>
                                <span class="detail-value">${stats.requiredRate} bpm, ${stats.dailyRate} per day</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Average Days per Book</span>
                                <span class="detail-value">${stats.avgDaysPerBook}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Remaining Days per Book</span>
                                <span class="detail-value">${stats.remainingDaysPerBook}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Forecast Book Total</span>
                                <span class="detail-value">${stats.forecastTotal}</span>
                            </div>
                        </div>` : ''}
                    </div>
                `;
            }

            let html = currentYearChallenges.map(renderChallengeCard).join('');

            if (previousYearChallenges.length > 0) {
                html += `
                    <div class="previous-challenges-section">
                        <div class="previous-challenges-header${previousChallengesExpanded ? ' expanded' : ''}" onclick="togglePreviousChallenges()">
                            <span class="collapse-arrow">${ICON_CHEVRON_RIGHT}</span>
                            <h2>Previous Challenges</h2>
                        </div>
                        <div class="previous-challenges-content${previousChallengesExpanded ? ' open' : ''}">
                            ${previousYearChallenges.map(renderChallengeCard).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function calculateStats(year, target, booksCompleted) {
            const now = new Date();
            const currentYear = now.getFullYear();

            if (!year || year < currentYear) {
                return { monthsRemaining: '0.0', daysRemaining: '0', requiredRate: 'N/A', dailyRate: 'N/A', currentRate: 'N/A', booksAhead: 'N/A', avgDaysPerBook: 'N/A', remainingDaysPerBook: 'N/A', forecastTotal: 'N/A' };
            }

            if (year > currentYear) {
                return { monthsRemaining: '12.0', daysRemaining: '365', requiredRate: 'N/A', dailyRate: 'N/A', currentRate: 'N/A', booksAhead: 'N/A', avgDaysPerBook: 'N/A', remainingDaysPerBook: 'N/A', forecastTotal: 'N/A' };
            }

            const startOfYear = new Date(year, 0, 1);
            const endOfYear = new Date(year, 11, 31, 23, 59, 59);
            const msElapsed = now - startOfYear;
            const msRemaining = endOfYear - now;
            const daysElapsed = msElapsed / (1000 * 60 * 60 * 24);
            const daysRemaining = Math.max(0, msRemaining / (1000 * 60 * 60 * 24));
            const monthsElapsed = daysElapsed / 30.44;
            const monthsRemaining = daysRemaining / 30.44;

            const booksRemaining = Math.max(0, target - booksCompleted);
            const requiredRate = monthsRemaining > 0 ? (booksRemaining / monthsRemaining).toFixed(1) : 'N/A';
            const dailyRate = daysRemaining > 0 ? ((booksRemaining / daysRemaining) * 100).toFixed(1) + '%' : 'N/A';
            const currentRate = monthsElapsed > 0 ? (booksCompleted / monthsElapsed).toFixed(1) : 'N/A';

            const expectedBooks = target * (monthsElapsed / 12);
            const booksAhead = booksCompleted - expectedBooks;
            const booksAheadClass = booksAhead >= 0 ? 'ahead' : 'behind';
            const booksAheadDisplay = `<span class="${booksAheadClass}">${booksAhead >= 0 ? '+' : ''}${booksAhead.toFixed(1)}</span>`;
            const avgDaysPerBookNum = booksCompleted > 0 ? daysElapsed / booksCompleted : null;
            const avgDaysPerBook = avgDaysPerBookNum !== null ? avgDaysPerBookNum.toFixed(1) : 'N/A';
            const remainingDaysPerBook = booksRemaining > 0 ? (daysRemaining / booksRemaining).toFixed(1) : 'N/A';
            const forecastTotal = avgDaysPerBookNum !== null ? (booksCompleted + (daysRemaining / avgDaysPerBookNum)).toFixed(1) : 'N/A';

            const totalDaysInYear = daysElapsed + daysRemaining;
            const percentElapsed = ((daysElapsed / totalDaysInYear) * 100).toFixed(1);

            return {
                monthsRemaining: monthsRemaining.toFixed(1),
                daysElapsed: Math.round(daysElapsed),
                percentElapsed: percentElapsed,
                daysRemaining: Math.round(daysRemaining),
                requiredRate: booksRemaining === 0 ? 'Complete' : requiredRate,
                dailyRate: booksRemaining === 0 ? 'Complete' : dailyRate,
                currentRate: currentRate,
                booksAhead: booksAheadDisplay,
                avgDaysPerBook: avgDaysPerBook,
                remainingDaysPerBook: booksRemaining === 0 ? 'Complete' : remainingDaysPerBook,
                forecastTotal: forecastTotal
            };
        }

        function toggleExpand(event, index) {
            if (event.target.closest('button')) return;
            if (expandedCards.has(index)) {
                expandedCards.delete(index);
            } else {
                expandedCards.add(index);
            }
            renderChallenges();
        }

        function togglePreviousChallenges() {
            previousChallengesExpanded = !previousChallengesExpanded;
            renderChallenges();
        }

        function saveChallenge() {
            const yearInput = document.getElementById('year');
            const targetInput = document.getElementById('target');
            const booksCompletedInput = document.getElementById('booksCompleted');

            const year = parseInt(yearInput.value) || 0;
            const target = parseInt(targetInput.value) || 0;
            const booksCompleted = parseInt(booksCompletedInput.value) || 0;

            if (year < 1900 || year > 2100 || target < 1) {
                alert('Please enter a valid year (1900-2100) and a target of at least 1.');
                return;
            }

            const challenges = loadChallenges();
            const currentYear = new Date().getFullYear();
            const shouldLock = year < currentYear;

            if (editingIndex !== null) {
                const existingLocked = challenges[editingIndex].locked;
                challenges[editingIndex] = { year, target, booksCompleted: Math.max(0, booksCompleted), locked: existingLocked || shouldLock };
            } else {
                challenges.push({ year, target, booksCompleted: Math.max(0, booksCompleted), locked: shouldLock });
            }

            saveChallenges(challenges);

            yearInput.value = '';
            targetInput.value = '';
            booksCompletedInput.value = '';

            renderChallenges();
            closeForm();
        }

        function editChallenge(index) {
            const challenges = loadChallenges();
            const challenge = challenges[index];

            if (!challenge) return;

            document.getElementById('year').value = challenge.year || '';
            document.getElementById('target').value = challenge.target || '';
            document.getElementById('booksCompleted').value = challenge.booksCompleted ?? 0;

            editingIndex = index;
            document.getElementById('formSubmitBtn').textContent = 'Save Changes';
            document.querySelector('.add-form h2').textContent = 'Edit Challenge';

            const form = document.getElementById('addForm');
            if (!form.classList.contains('open')) {
                form.classList.add('open');
            }
            document.getElementById('year').focus();
        }

        function closeForm() {
            const form = document.getElementById('addForm');
            form.classList.remove('open');
            editingIndex = null;
            document.getElementById('formSubmitBtn').textContent = 'Add Challenge';
            document.querySelector('.add-form h2').textContent = 'New Challenge';
            document.getElementById('year').value = '';
            document.getElementById('target').value = '';
            document.getElementById('booksCompleted').value = '';
        }

        function toggleLock(index) {
            const challenges = loadChallenges();
            if (challenges[index]) {
                challenges[index].locked = !challenges[index].locked;
                saveChallenges(challenges);
                renderChallenges();
            }
        }

        function updateCompleted(index, delta) {
            const challenges = loadChallenges();
            if (challenges[index]) {
                challenges[index].booksCompleted = Math.max(0, (challenges[index].booksCompleted ?? 0) + delta);
                saveChallenges(challenges);
                renderChallenges();
            }
        }

        function deleteChallenge(index) {
            if (confirm('Delete this challenge?')) {
                const challenges = loadChallenges();
                challenges.splice(index, 1);
                saveChallenges(challenges);
                renderChallenges();
            }
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            const backdrop = document.getElementById('sheetBackdrop');
            const isOpen = panel.classList.toggle('open');
            backdrop.classList.toggle('open', isOpen);
            document.body.style.overflow = isOpen ? 'hidden' : '';
        }

        function toggleAddForm() {
            const form = document.getElementById('addForm');
            if (form.classList.contains('open')) {
                closeForm();
            } else {
                editingIndex = null;
                document.getElementById('formSubmitBtn').textContent = 'Add Challenge';
                document.querySelector('.add-form h2').textContent = 'New Challenge';
                form.classList.add('open');
                document.getElementById('year').focus();
            }
        }

        function exportData() {
            const challenges = loadChallenges();
            const json = JSON.stringify(challenges, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const now = new Date();
            const timestamp = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + '-' +
                String(now.getHours()).padStart(2, '0') +
                String(now.getMinutes()).padStart(2, '0') +
                String(now.getSeconds()).padStart(2, '0');

            const a = document.createElement('a');
            a.href = url;
            a.download = `reading-challenges-${timestamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data)) {
                        throw new Error('Invalid format');
                    }
                    saveChallenges(data);
                    renderChallenges();
                    toggleSettings();
                    alert('Data imported successfully.');
                } catch (err) {
                    alert('Failed to import data. Please check the file format.');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function resetAllData() {
            if (confirm('Are you sure you want to reset all data? This cannot be undone.')) {
                localStorage.removeItem(STORAGE_KEY);
                renderChallenges();
                toggleSettings();
            }
        }

        function lockPreviousYears() {
            const currentYear = new Date().getFullYear();
            const challenges = loadChallenges();
            let changed = false;

            challenges.forEach(c => {
                if (c.year && c.year < currentYear && !c.locked) {
                    c.locked = true;
                    changed = true;
                }
            });

            if (changed) {
                saveChallenges(challenges);
            }
        }

        function expandCurrentYear() {
            const currentYear = new Date().getFullYear();
            const challenges = loadChallenges();
            challenges.forEach((c, index) => {
                if (c.year === currentYear) {
                    expandedCards.add(index);
                }
            });
        }

        function generateAppIcon() {
            // Draw at 512×512 for crisp rendering, using a 180-unit design space
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const s = size / 180;
            const cx = 90, cy = 90;

            function drawBackground() {
                ctx.save();
                ctx.scale(s, s);
                // Rounded-rect background
                const bgR = 38;
                ctx.beginPath();
                ctx.moveTo(bgR, 0);
                ctx.lineTo(180 - bgR, 0);
                ctx.arcTo(180, 0,   180, bgR,       bgR);
                ctx.lineTo(180, 180 - bgR);
                ctx.arcTo(180, 180, 180 - bgR, 180, bgR);
                ctx.lineTo(bgR, 180);
                ctx.arcTo(0,   180, 0, 180 - bgR,   bgR);
                ctx.lineTo(0, bgR);
                ctx.arcTo(0,   0,   bgR, 0,          bgR);
                ctx.closePath();
                ctx.fillStyle = '#111318';
                ctx.fill();

                // Progress ring: 300° arc, 60° gap at visual bottom
                // Arc from 120° → 60° clockwise (canvas coords: 0°=right, CW) = 300° sweep
                ctx.strokeStyle = '#3d8ef5';
                ctx.lineWidth = 9;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(cx, cy, 68, 2 * Math.PI / 3, Math.PI / 3, false);
                ctx.stroke();
                ctx.restore();
            }

            function applyIcons() {
                document.getElementById('appIcon').href = canvas.toDataURL('image/png');

                // SVG favicon — Font Awesome solid book-open, same composition
                const faviconSvg =
                    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">` +
                    `<rect width="32" height="32" rx="7" fill="#111318"/>` +
                    `<path d="M9.5 27.3A13 13 0 1 1 22.5 27.3" stroke="#3d8ef5" stroke-width="2.5" fill="none" stroke-linecap="round"/>` +
                    // FA solid book-open (viewBox 0 0 576 512) scaled/centred in 32×32
                    `<g transform="translate(10,11.2) scale(0.02083)">` +
                    `<path fill="white" d="M249.6 471.5c10.8 3.8 22.4-4.1 22.4-15.5V78.6c0-4.2-1.6-8.4-5-11C247.4 52 202.4 32 144 32C93.5 32 46.3 45.3 18.1 56.1C6.8 60.5 0 71.7 0 83.8V454.1c0 11.9 12.8 20.2 24.1 16.5C55.6 460.1 105.5 448 144 448c33.9 0 79 14 105.6 23.5zm76.8 0C353 462 398.1 448 432 448c38.5 0 88.4 12.1 119.9 22.6c11.3 3.8 24.1-4.6 24.1-16.5V83.8c0-12.1-6.8-23.3-18.1-27.6C529.7 45.3 482.5 32 432 32c-58.4 0-103.4 20-123 45.6c-3.3 2.6-5 6.8-5 11V456c0 11.4 11.7 19.3 22.4 15.5z"/>` +
                    `</g>` +
                    `</svg>`;
                const faviconEl = document.getElementById('faviconEl');
                if (faviconEl) {
                    faviconEl.href = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(faviconSvg);
                }
            }

            drawBackground();

            // Book: Font Awesome 6 solid "book-open" (viewBox 0 0 576 512)
            // Loaded as an SVG image so it renders with smooth curves at any resolution
            const bookSvg =
                `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">` +
                `<path fill="white" d="M249.6 471.5c10.8 3.8 22.4-4.1 22.4-15.5V78.6c0-4.2-1.6-8.4-5-11` +
                `C247.4 52 202.4 32 144 32C93.5 32 46.3 45.3 18.1 56.1C6.8 60.5 0 71.7 0 83.8V454.1` +
                `c0 11.9 12.8 20.2 24.1 16.5C55.6 460.1 105.5 448 144 448c33.9 0 79 14 105.6 23.5z` +
                `M326.4 471.5C353 462 398.1 448 432 448c38.5 0 88.4 12.1 119.9 22.6c11.3 3.8 24.1-4.6 24.1-16.5` +
                `V83.8c0-12.1-6.8-23.3-18.1-27.6C529.7 45.3 482.5 32 432 32c-58.4 0-103.4 20-123 45.6` +
                `c-3.3 2.6-5 6.8-5 11V456c0 11.4 11.7 19.3 22.4 15.5z"/>` +
                `</svg>`;

            const bookImg = new Image();
            bookImg.onload = function() {
                ctx.save();
                ctx.scale(s, s);
                // 36% of design area, nudged slightly downward to sit inside the ring
                const bookW = 64.8, bookH = bookW * (512 / 576);
                const bx = (180 - bookW) / 2;
                const by = (180 - bookH) / 2 + 3.6;
                ctx.drawImage(bookImg, bx, by, bookW, bookH);
                ctx.restore();
                applyIcons();
            };
            bookImg.onerror = applyIcons; // graceful fallback
            bookImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(bookSvg);
        }

        // Register service worker for offline / home screen use
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW registration failed:', e));
            // When a new service worker takes control, reload to get the latest version
            navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
        }

        // Initialize app
        try { generateAppIcon(); } catch (e) { console.warn('Icon generation failed:', e); }
        document.getElementById('settingsBtn').innerHTML = ICON_GEAR;
        document.getElementById('chevronExport').innerHTML = ICON_CHEVRON_RIGHT;
        document.getElementById('chevronImport').innerHTML = ICON_CHEVRON_RIGHT;
        document.getElementById('versionInfo').textContent = `Version ${APP_VERSION}`;
        applyTheme(loadSettings().theme || 'dark');
        lockPreviousYears();
        expandCurrentYear();
        renderChallenges();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('settingsPanel').classList.contains('open')) {
                toggleSettings();
            }
        });

        (function setupSheetDrag() {
            const sheet = document.getElementById('settingsPanel');
            const zone = document.getElementById('sheetDragZone');
            const CLOSE_DISTANCE = 80;
            const CLOSE_VELOCITY = 0.5;
            let startY = 0;
            let startTime = 0;
            let delta = 0;
            let dragging = false;

            zone.addEventListener('pointerdown', (e) => {
                if (!sheet.classList.contains('open')) return;
                dragging = true;
                startY = e.clientY;
                startTime = performance.now();
                delta = 0;
                sheet.style.transition = 'none';
                zone.setPointerCapture(e.pointerId);
            });

            zone.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                delta = Math.max(0, e.clientY - startY);
                sheet.style.transform = `translateY(${delta}px)`;
            });

            const endDrag = () => {
                if (!dragging) return;
                dragging = false;
                const velocity = delta / (performance.now() - startTime);
                sheet.style.transition = '';
                sheet.style.transform = '';
                if (delta > CLOSE_DISTANCE || velocity > CLOSE_VELOCITY) {
                    toggleSettings();
                }
            };

            zone.addEventListener('pointerup', endDrag);
            zone.addEventListener('pointercancel', endDrag);
        })();
    </script>
</body>
